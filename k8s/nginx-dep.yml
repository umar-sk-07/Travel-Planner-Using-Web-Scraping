---
# ══════════════════════════════════════════════════════════════════════════════
# TEST DEPLOYMENT FOR ARGOCD AUTO-SYNC
# This is a simple nginx deployment to test if ArgoCD picks up changes
# ══════════════════════════════════════════════════════════════════════════════

apiVersion: v1
kind: Namespace
metadata:
  name: trip-planner

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-test
  namespace: trip-planner
  labels:
    app: nginx-test
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nginx-test
  template:
    metadata:
      labels:
        app: nginx-test
    spec:
      containers:
      - name: nginx
        image: nginx:latest
        ports:
        - containerPort: 80
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "100m"

---
apiVersion: v1
kind: Service
metadata:
  name: nginx-test-service
  namespace: trip-planner
spec:
  selector:
    app: nginx-test
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
  type: ClusterIP
