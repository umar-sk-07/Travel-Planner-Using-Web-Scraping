# EKS Auto Mode has a BUILT-IN storage provisioner.
# It does NOT use the standalone aws-ebs-csi-driver addon.
# The correct provisioner for Auto Mode is ebs.csi.eks.amazonaws.com
# (NOT ebs.csi.aws.com which is for the standalone addon on standard EKS)
#
# Auto Mode nodes register topology keys under ebs.csi.eks.amazonaws.com/zone
# not topology.ebs.csi.aws.com/zone — that's why CSINode topology lookup fails.

apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: ebs-gp2
  annotations:
    storageclass.kubernetes.io/is-default-class: "true"
provisioner: ebs.csi.eks.amazonaws.com      # Auto Mode's built-in EBS provisioner
parameters:
  type: gp3                                  # gp3 is cheaper and faster than gp2
  fsType: ext4
volumeBindingMode: WaitForFirstConsumer      # Still correct — AZ-aware binding
reclaimPolicy: Delete
allowVolumeExpansion: true
